<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer & FPO Order System</title>
  <style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f4f8f7;
    margin: 0;
    padding: 0;
  }

  header {
    background: #1a7431;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .app-container3 {
    padding: 30px;
    max-width: 1200px;
    margin: auto;
  }

  /* Form section */
  .form-container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 30px;
  }

  .form-container h2 {
    color: #1a7431;
    margin-bottom: 15px;
  }

  .form-container input, .form-container select, .form-container textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  .form-container button {
    background-color: #1a7431;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s ease;
  }

  .form-container button:hover {
    background-color: #145a27;
  }

  /* Tabs */
  .tabs-container3 {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
  }

  .tab3 {
    background-color: #e6f0ea;
    color: #1a7431;
    border: none;
    padding: 12px 30px;
    margin: 0 10px;
    border-radius: 25px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .tab3:hover {
    background-color: #cde9d9;
  }

  .active3 {
    background-color: #1a7431;
    color: white;
  }

  /* Profile grid */
  .profile-grid3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    justify-items: center;
  }

  /* Profile card */
  .profile-card3 {
    background: white;
    border-radius: 20px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    width: 320px;
    padding: 25px;
    text-align: center;
    transition: transform 0.3s ease;
  }

  .profile-card3:hover {
    transform: translateY(-5px);
  }

  .profile-image3 img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-bottom: 15px;
  }

  .profile-details3 p {
    margin: 8px 0;
    font-size: 15px;
    color: #333;
  }

  .profile-details3 strong {
    color: #1a7431;
  }

  .whatsapp-button3 {
    background-color: #25d366;
    color: white;
    border: none;
    border-radius: 25px;
    padding: 10px 20px;
    margin-top: 15px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s ease;
  }

  .whatsapp-button3:hover {
    background-color: #1ebe57;
  }

  .success {
    color: green;
    font-weight: 600;
    text-align: center;
    margin-top: 10px;
  }
  </style>
</head>
<body>
  <header> Farmer & FPO Order System</header>

  <div class="app-container3">
    <!-- Form -->
    <div class="form-container">
      <h2>Submit Your Order</h2>
      <form id="orderForm">
        <label for="typeOfUser">User Type:</label>
        <select id="typeOfUser" required>
          <option value="Farmer">Farmer</option>
          <option value="FPO">FPO</option>
        </select>

        <input type="text" id="name" placeholder="Name" required />
        <input type="text" id="phoneNumber" placeholder="Phone Number" required />
        <input type="text" id="location" placeholder="Location" required />
        <input type="text" id="selectedService" placeholder="Service Required" required />
        <textarea id="message" placeholder="Message (Optional)"></textarea>

        <button type="submit">Submit Order</button>
      </form>
      <div id="successMsg" class="success"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs-container3">
      <button class="tab3 active3" id="farmerTab">Farmer</button>
      <button class="tab3" id="fpoTab">FPO</button>
    </div>

    <!-- Data display -->
    <div id="profileGrid" class="profile-grid3">
      <p>Loading data...</p>
    </div>

    <div class="debug-controls" style="margin-top:16px; display:flex; gap:8px; align-items:center;">
      <button id="toggleRawBtn" class="btn btn-sm btn-outline-secondary">Show debug</button>
      <button id="refreshBtn" class="btn btn-sm btn-secondary">Refresh</button>
      <small style="color:#666; margin-left:8px;">(debug info hidden by default)</small>
    </div>

    <div id="debugPanel" class="debug-panel" style="display:none; margin-top:12px;">
      <h3 style="margin:0 0 8px 0; font-size:16px; color:#333">Raw response (debug)</h3>
      <pre id="rawData" style="background:#fff;padding:12px;border-radius:8px;max-height:300px;overflow:auto;font-size:13px;">(no data yet)</pre>
    </div>

  <!-- If server passed `selected_type`, initialize the form/tab accordingly -->
  <script>
    (function(){
      var initType = "{{ selected_type|default('') }}";
      if (initType) {
        document.addEventListener('DOMContentLoaded', function(){
          try {
            const sel = document.getElementById('typeOfUser');
            if (sel) sel.value = initType;
            if (initType === 'FPO') {
              const t = document.getElementById('fpoTab');
              if (t) t.click();
            } else {
              const t = document.getElementById('farmerTab');
              if (t) t.click();
            }
          } catch (e) {
            console.warn('initType error', e);
          }
        });
      }
    })();
  </script>
  <!-- Order page script -->
  <script src="/static/js/order.js"></script>
</body>
</html>
