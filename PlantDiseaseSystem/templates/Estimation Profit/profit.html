    .container {
      background:url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1400&q=80');
        background-size: cover;
        background-position: center;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      max-width: 550px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #2e7d32;
      font-size: 28px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #444;
      font-weight: 600;
      margin-top: 15px;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    input[type="number"]:focus {
      border-color: #4caf50;
      outline: none;
    }

    .toggle-unit {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }

    .toggle-unit button {
      background-color: #f1f1f1;
      border: 1px solid #ccc;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: 0.3s ease;
    }

    .toggle-unit button.active {
      background-color: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    button.calculate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #66bb6a, #43a047);
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      margin-top: 25px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button.calculate:hover {
      background: linear-gradient(to right, #43a047, #388e3c);
    }

    #result {
      margin-top: 30px;
      background-color: #f1f8e9;
      padding: 20px;
      border-left: 6px solid #8bc34a;
      border-radius: 10px;
      font-size: 16px;
      color: #33691e;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crop Profit Estimator</h1>

    <div class="toggle-unit">
      <span>Unit:</span>
      <button id="tonsBtn" class="active">Tons</button>
      <button id="quintalsBtn">Quintals</button>
    </div>

    <label for="seeds">Seeds Expenses (₹):</label>
    <input type="number" id="seeds" placeholder="e.g. 5000">

    <label for="machinery">Machinery Expenses (₹):</label>
    <input type="number" id="machinery" placeholder="e.g. 8000">

    <label for="labors">Labor Expenses (₹):</label>
    <input type="number" id="labors" placeholder="e.g. 6000">

    <label for="fertilizers">Fertilizer Expenses (₹):</label>
    <input type="number" id="fertilizers" placeholder="e.g. 3000">

    <label for="irrigation">Irrigation Expenses (₹):</label>
    <input type="number" id="irrigation" placeholder="e.g. 2000">

    <label for="harvesting">Harvesting Expenses (₹):</label>
    <input type="number" id="harvesting" placeholder="e.g. 4000">

    <label id="yieldLabel" for="yield">Yield (in Tons):</label>
    <input type="number" id="yield" placeholder="e.g. 10">

    <label for="costPerKg">Selling Price per Kg (₹):</label>
    <input type="number" id="costPerKg" placeholder="e.g. 25">

    <button class="calculate" onclick="calculateProfit()">Calculate Profit</button>

    <div id="result" style="display:none;"></div>
  </div>

  <script>
    let isTons = true;

    const tonsBtn = document.getElementById('tonsBtn');
    const quintalsBtn = document.getElementById('quintalsBtn');
    const yieldLabel = document.getElementById('yieldLabel');

    function updateUnitToggle() {
      yieldLabel.textContent = `Yield (in ${isTons ? 'Tons' : 'Quintals'}):`;
      tonsBtn.classList.toggle('active', isTons);
      quintalsBtn.classList.toggle('active', !isTons);
    }

    tonsBtn.addEventListener('click', () => {
      isTons = true;
      updateUnitToggle();
    });

    quintalsBtn.addEventListener('click', () => {
      isTons = false;
      updateUnitToggle();
    });

    function formatCurrency(value) {
      return value.toLocaleString('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 2
      });
    }

    function calculateProfit() {
      const ids = ['seeds', 'machinery', 'labors', 'fertilizers', 'irrigation', 'harvesting', 'yield', 'costPerKg'];
      let values = {};

      for (let id of ids) {
        const val = parseFloat(document.getElementById(id).value);
        if (isNaN(val)) {
          alert(`Please enter a valid number for ${id}`);
          return;
        }
        values[id] = val;
      }

      const totalExpenses = values.seeds + values.machinery + values.labors + values.fertilizers + values.irrigation + values.harvesting;
      const totalYieldKg = isTons ? values.yield * 1000 : values.yield * 100;
      const totalRevenue = totalYieldKg * values.costPerKg;
      const profit = totalRevenue - totalExpenses;

      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerHTML = `
        <p><strong>Total Revenue:</strong> ${formatCurrency(totalRevenue)}</p>
        <p><strong>Total Expenses:</strong> ${formatCurrency(totalExpenses)}</p>
        <p><strong>Net Profit:</strong> ${formatCurrency(profit)}</p>
      `;
    }

    updateUnitToggle();
  </script>
</body>
</html>
